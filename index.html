<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Profissional</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:#f5f7fa;
    max-width:650px;
    margin:0 auto;
    padding:10px;
    text-align:center;
    color:#222;
}

/* Cabeçalho */

.topo{
    position:sticky;
    top:0;
    z-index:100;
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:16px;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
}

.topo h1{
    font-size:24px;
    color:#00008b;
}

/* Card principal */

.container{
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

/* Área de texto */

textarea{
    width:100%;
    height:120px;
    padding:8px;
    border:2px solid #ddd;
    border-radius:12px;
    margin-bottom:10px;
    resize:none;
    font-size:16px;
    outline:none;
}

textarea:focus{
    border-color:#00008b;
}

/* Upload */

label{
    display:block;
    margin-bottom:15px;
    font-weight:bold;
}

input[type=file]{
    margin-top:8px;
}

/* Botões */

.botoes{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:5px;
}

button{
    padding:12px 9px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(.97);
}

#gerar{
    background:#00008b;
    color:#fff;
}

#baixarPNG{
    background:#4CAF50;
    color:#fff;
}

#baixarSVG{
    background:#673AB7;
    color:#fff;
}

#lerQR{
    background:#b81414;
    color:#fff;
}

/* QR Code */

#qrcode{
    margin-top:20px;
    display:flex;
    justify-content:center;
}

#qrcode svg{
    width:min(90vw,320px);
    height:auto;
}

/* Scanner */

#reader{
    margin-top:5px;
    width:100%;
    overflow:hidden;
    border-radius:15px;
}

/* Resultado */

#resultado{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    word-break:break-word;
}

#resultado h3{
    margin-bottom:10px;
}

#resultado button{
    margin-top:7px;
    background:#00008b;
    color:#fff;
}

/* Mobile */

@media (max-width:480px){

    body{
        padding:8px;
    }

    .container{
        padding:15px;
    }

    .botoes{
        grid-template-columns:1fr;
    }

    button{
        width:100%;
    }

    #qrcode svg{
        width:95%;
    }
}

/* Modo escuro */

@media (prefers-color-scheme:dark){

    body{
        background:#121212;
        color:#eee;
    }

    .topo,
    .container,
    #resultado{
        background:#1e1e1e;
        color:#fff;
    }

    textarea{
        background:#2a2a2a;
        color:#fff;
        border-color:#444;
    }

    .topo h1{
        color:#7aa7ff;
    }
}
</style>
</head>
<body>

<header class="topo">
    <h1>QR Code Pro</h1>
</header>

<div class="container">
<textarea id="texto"
placeholder="Digite texto, link, PIX, telefone..."></textarea>

<br>

<label>
🖼️ Logo (opcional):
<input type="file" id="logoInput" accept="image/*">
</label>

<div class="botoes">
<button id="gerar">Gerar QR</button>
<button id="baixarPNG">Salvar PNG</button>
<button id="baixarSVG">Salvar SVG</button>
<button id="lerQR">Ler QR</button>
</div>

<div id="qrcode"></div>

<div id="reader"></div>

<div id="resultado"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let svgAtual = null;
let logoData = null;

document
.getElementById("logoInput")
.addEventListener("change", function(e){

    const arquivo = e.target.files[0];

    if(!arquivo) return;

    const leitor = new FileReader();

    leitor.onload = function(evt){
        logoData = evt.target.result;
    };

    leitor.readAsDataURL(arquivo);
});

document
.getElementById("gerar")
.addEventListener("click", gerarQR);

function gerarQR(){

    const texto =
    document.getElementById("texto").value.trim();

    if(!texto){
        alert("Digite algum conteúdo.");
        return;
    }

    const qr = qrcode(0,"H");

    qr.addData(texto);
    qr.make();

    document.getElementById("qrcode").innerHTML =
    qr.createSvgTag({
        scalable:true
    });

    svgAtual =
    document.querySelector("#qrcode svg");

    if(logoData){

        const img =
        document.createElementNS(
        "http://www.w3.org/2000/svg",
        "image"
        );

        img.setAttributeNS(
        "http://www.w3.org/1999/xlink",
        "href",
        logoData
        );

        img.setAttribute("x","40%");
        img.setAttribute("y","40%");
        img.setAttribute("width","20%");
        img.setAttribute("height","20%");

        svgAtual.appendChild(img);
    }
}

document
.getElementById("baixarSVG")
.addEventListener("click", ()=>{

    if(!svgAtual){
        alert("Gere um QR primeiro.");
        return;
    }

    const blob = new Blob(
        [svgAtual.outerHTML],
        {type:"image/svg+xml"}
    );

    const link =
    document.createElement("a");

    link.href =
    URL.createObjectURL(blob);

    link.download = "qrcode.svg";

    link.click();
});

document
.getElementById("baixarPNG")
.addEventListener("click", ()=>{

    if(!svgAtual){
        alert("Gere um QR primeiro.");
        return;
    }

    const svgData =
    new XMLSerializer()
    .serializeToString(svgAtual);

    const canvas =
    document.createElement("canvas");

    canvas.width = 2000;
    canvas.height = 2000;

    const ctx =
    canvas.getContext("2d");

    const img = new Image();

    img.onload = ()=>{

        ctx.fillStyle="#fff";
        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.drawImage(
            img,
            0,
            0,
            canvas.width,
            canvas.height
        );

        const link =
        document.createElement("a");

        link.download =
        "qrcode-alta-resolucao.png";

        link.href =
        canvas.toDataURL("image/png");

        link.click();
    };

    img.src =
    "data:image/svg+xml;base64," +
    btoa(unescape(
    encodeURIComponent(svgData)
    ));
});

let scannerAtivo = false;
let html5QrCode;

document
.getElementById("lerQR")
.addEventListener("click", async ()=>{

    if(scannerAtivo){

        await html5QrCode.stop();

        document
        .getElementById("reader")
        .innerHTML = "";

        scannerAtivo = false;

        return;
    }

    html5QrCode =
    new Html5Qrcode("reader");

    html5QrCode.start(
{
    facingMode:"environment"
},
{
    fps:10,
    qrbox:250
},
async (textoLido) => {

    const resultado =
    document.getElementById("resultado");

    if (navigator.vibrate) {
        navigator.vibrate(200);
    }

    resultado.innerHTML = "";

    const titulo =
    document.createElement("h3");

    const conteudo =
    document.createElement("div");

    const botao =
    document.createElement("button");

    conteudo.style.wordBreak = "break-all";
    conteudo.style.marginBottom = "10px";

    // LINK
    if (
        textoLido.startsWith("http://") ||
        textoLido.startsWith("https://")
    ) {

        titulo.textContent = "🌐 Link";
        conteudo.textContent = textoLido;

        botao.textContent = "Abrir Link";

        botao.onclick = () => {
            window.open(textoLido, "_blank");
        };

        resultado.append(
            titulo,
            conteudo,
            botao
        );
    }

    // TELEFONE
    else if (textoLido.startsWith("tel:")) {

        titulo.textContent = "📞 Telefone";

        conteudo.textContent =
        textoLido.replace("tel:", "");

        botao.textContent = "Ligar";

        botao.onclick = () => {
            window.location.href = textoLido;
        };

        resultado.append(
            titulo,
            conteudo,
            botao
        );
    }

    // EMAIL
    else if (textoLido.startsWith("mailto:")) {

        titulo.textContent = "✉️ E-mail";

        conteudo.textContent =
        textoLido.replace("mailto:", "");

        botao.textContent = "Enviar E-mail";

        botao.onclick = () => {
            window.location.href = textoLido;
        };

        resultado.append(
            titulo,
            conteudo,
            botao
        );
    }

    // PIX COPIA E COLA
    else if (
        textoLido.startsWith("000201") ||
        textoLido.includes("BR.GOV.BCB.PIX")
    ) {

        titulo.textContent = "💰 PIX";

        conteudo.textContent = textoLido;

        botao.textContent = "Copiar PIX";

        botao.onclick = async () => {

            await navigator.clipboard.writeText(
                textoLido
            );

            alert("PIX copiado!");
        };

        resultado.append(
            titulo,
            conteudo,
            botao
        );
    }

    // TEXTO COMUM
    else {

        titulo.textContent = "📄 Texto";

        conteudo.textContent = textoLido;

        botao.textContent = "Copiar";

        botao.onclick = async () => {

            await navigator.clipboard.writeText(
                textoLido
            );

            alert("Texto copiado!");
        };

        resultado.append(
            titulo,
            conteudo,
            botao
        );
    }

    await html5QrCode.stop();
    scannerAtivo = false;
}
);
scannerAtivo = true;
});

</script>

</body>
</html>
